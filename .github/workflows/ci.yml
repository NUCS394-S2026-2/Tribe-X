name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create Firebase config
        run: |
          cat > src/shared/firebase.ts << 'EOF'
          import { initializeApp } from "firebase/app";
          import { getAuth } from "firebase/auth";
          import { getFirestore } from "firebase/firestore";
          import { getStorage } from "firebase/storage";

          const firebaseConfig = {
            apiKey: "${{ secrets.VITE_FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.VITE_FIREBASE_APP_ID }}"
          };

          const app = initializeApp(firebaseConfig);
          export const auth = getAuth(app);
          export const db = getFirestore(app);
          export const storage = getStorage(app);
          EOF

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
